name = "novelforge-worker"
main = "apps/worker/src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "novelforge"
database_id = "your-d1-database-id"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "novelforge-storage"

[[vectorize]]
binding = "VECTORIZE"
index_name = "novelforge-index"
# dimensions = 768 (bge-base-zh)

[ai]
binding = "AI"

# Secrets (设置方式: wrangler secret put XXX)
# VOLCENGINE_API_KEY
# ANTHROPIC_API_KEY
# OPENAI_API_KEY

[build]
command = "pnpm build"
