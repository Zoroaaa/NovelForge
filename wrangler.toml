name = "novelforge"
pages_build_output_dir = "dist"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "novelforge"
database_id = "3c09a004-21df-421c-856a-142ead75cdfd"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "novelforge-storage"

[ai]
binding = "AI"

# Vectorize 向量索引（Phase 2 RAG 功能）
# 需要先运行: wrangler vectorize create novelforge-index --dimensions=768 --metric=cosine
[[vectorize]]
binding = "VECTORIZE"
index_name = "novelforge-index"

# Queues 任务队列（异步任务处理）
[[queues.producers]]
binding = "TASK_QUEUE"
queue = "novelforge-tasks"

