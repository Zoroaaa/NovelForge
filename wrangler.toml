name = "novelforge"
main = "server/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[assets]
directory = "dist"

[[d1_databases]]
binding = "DB"
database_name = "novelforge"
database_id = "3c09a004-21df-421c-856a-142ead75cdfd"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "novelforge-storage"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "novelforge-index"

[[queues.producers]]
binding = "TASK_QUEUE"
queue = "novelforge-tasks"

[[queues.consumers]]
queue = "novelforge-tasks"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
